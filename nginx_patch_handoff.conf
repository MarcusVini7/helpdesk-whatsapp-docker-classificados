# nginx/conf.d/PATCH_handoff.conf
#
# Adicione estes blocos location dentro do server {} existente em default.conf
# para habilitar as rotas de handoff de autenticação entre sistemas.

# ─── Handoff Helpdesk → AMD2 (usuário clica em AMD2 no menu) ─────────────────
# /amd2/auth/handoff?token=...  →  PHP handoff.php
location /amd2/auth/handoff {
    proxy_pass http://amd2-api:9000/api/handoff.php;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ─── Handoff AMD2 → Helpdesk (usuário clica em Helpdesk no menu) ─────────────
# /helpdesk/auth/handoff?token=...  →  Node authHandoff.js
location /helpdesk/auth/handoff {
    proxy_pass http://helpdesk-server:3002/auth/handoff;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ─── navMenu.js compartilhado (servido a partir do Helpdesk) ─────────────────
# Ambos os frontends carregam o menu do mesmo lugar.
location /shared/navMenu.js {
    proxy_pass http://helpdesk-server:3002/shared/navMenu.js;
    proxy_set_header Host $host;
    add_header Cache-Control "public, max-age=3600";
}
