name: helpdesk_amd2_integration

services:
  integration-net-keeper:
    image: alpine:3.20
    container_name: helpdesk_amd2_integration_net
    command: ["sh", "-lc", "while true; do sleep 3600; done"]
    restart: unless-stopped
    networks:
      helpdesk_amd2_bridge:
        aliases:
          - integration-net

networks:
  helpdesk_amd2_bridge:
    name: helpdesk_amd2_bridge
    driver: bridge
